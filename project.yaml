# Project config for the CAPZ Prow dashboard (Dynamo demo).
# Same as prod CAPZ, but analyses come from an in-cluster open-weight model
# (Kimi-K2.7-Code) served via NVIDIA Dynamo. Lets the team compare quality.

id: capz-dynamo
name: "Cluster API Provider Azure (Dynamo demo)"
short_name: "CAPZ-Dynamo"

# Jobs advertising this testgrid dashboard are discovered automatically.
testgrid:
  dashboard: "sig-cluster-lifecycle-cluster-api-provider-azure"

# Same category rules as prod CAPZ for an apples-to-apples comparison.
categories:
  - match: "conformance"
    id: "conformance"
    label: "Conformance"
  - match: "[managed kubernetes]"
    id: "aks-e2e"
    label: "AKS E2E"
  - match: "e2e-aks"
    id: "aks-e2e"
    label: "AKS E2E"
  - match: "capi-e2e"
    id: "capi-e2e"
    label: "CAPI E2E"
  - match: "upgrade"
    id: "upgrade"
    label: "Upgrade"
  - match: "coverage"
    id: "coverage"
    label: "Coverage"
  - match: "scalability"
    id: "scalability"
    label: "Scalability"
  - match: "e2e"
    id: "capz-e2e"
    label: "CAPZ E2E"

category_display_order:
  - capz-e2e
  - aks-e2e
  - upgrade
  - capi-e2e
  - conformance
  - coverage
  - scalability

# GCS bucket holding build artifacts.
gcs:
  bucket: "kubernetes-ci-logs"

# UI branding.
branding:
  title: "CAPZ Prow Dashboard (Dynamo demo)"
  base_path: "/capz-prow-ai-dashboard-dynamo"
  site_url: "https://willie-yao.github.io/capz-prow-ai-dashboard-dynamo"
  source_repo:
    owner: "kubernetes-sigs"
    name: "cluster-api-provider-azure"

# AI settings. Endpoint + model come from repo vars set in deploy.yml
# (demo: in-cluster Kimi-K2.7-Code over Dynamo). AI_TOKEN can be any
# non-empty string; the Dynamo frontend needs no API key.
ai:
  # Parallel analyses per fetch.
  concurrency: 4

  # Per-failure wall-clock budget (Kimi decodes slowly; give long digs room).
  timeout: 15m

  # Max agentic iterations per failure.
  max_iters: 30
  # Investigation floors. Byte budgets are auto-sized from the endpoint's
  # context window, so they're left unset.
  min_tool_calls: 5
  min_gcs_bytes: 500000
  # On a critique retry, inject artifacts the draft cited but never read.
  evidence_injection: true
  # Draft + critique retry loop.
  critique:
    enabled: true
    max_retries: 2
  # Tools exposed to the agentic loop.
  tools:
    - filesystem
    - k8s
